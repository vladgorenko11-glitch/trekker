<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Звички — трекер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0D0F14;
    --bg-elevated: #14171F;
    --card: #1A1E28;
    --card-border: #262B38;
    --divider: #232837;
    --text-primary: #F2F3F7;
    --text-secondary: #8A90A3;
    --text-tertiary: #565C6E;
    --track: #262B38;
    --danger: #FF6B5B;
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    height: 100%;
  }

  body {
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(62,155,255,0.10), transparent 60%),
      var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 460px;
    min-height: 100vh;
    padding: 28px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .header { text-align: center; padding: 0 6px; }
  .header h1 {
    font-family: 'Rubik', sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.25;
    margin: 0;
    letter-spacing: -0.3px;
  }
  .header .accent {
    background: linear-gradient(90deg, #3E9BFF, #D24FE0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* ---------- Habit rail ---------- */
  .habit-rail {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding: 6px 2px 10px;
    scrollbar-width: none;
  }
  .habit-rail::-webkit-scrollbar { display: none; }

  .habit-chip-wrap { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 6px; width: 76px; }

  .habit-chip {
    width: 76px; height: 76px; border-radius: 50%;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: var(--track);
    padding: 5px;
    transition: padding .15s ease;
  }
  .habit-chip .fill {
    width: 100%; height: 100%; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    position: relative;
    transition: filter .15s ease;
  }
  .habit-chip.active .fill { box-shadow: 0 0 0 3px var(--bg), 0 6px 18px rgba(0,0,0,0.35); }
  .habit-chip .fill svg { width: 30px; height: 30px; position: relative; z-index: 1; }
  .habit-chip .fill img { width: 30px; height: 30px; object-fit: cover; border-radius: 50%; position: relative; z-index: 1; }

  /* Звичку повністю виконано сьогодні — затемнюємо кружок і показуємо галочку */
  .habit-chip.complete .fill { filter: brightness(0.5) saturate(0.85); }
  .habit-chip.complete .fill::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,0,0,0.18);
  }
  .habit-chip.complete .done-badge {
    position: absolute; bottom: -2px; right: -2px; z-index: 2;
    width: 22px; height: 22px; border-radius: 50%;
    background: #1FCE7A;
    border: 2px solid var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .habit-chip.complete .done-badge svg { width: 12px; height: 12px; stroke: #06131F; stroke-width: 3; }

  .habit-chip-label {
    font-size: 11px;
    color: var(--text-tertiary);
    max-width: 76px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .habit-chip.add { background: transparent; border: 2px dashed var(--card-border); }
  .habit-chip.add .fill { background: transparent; color: var(--text-tertiary); font-size: 30px; font-weight: 300; }

  /* ---------- Streak board (вогники) ---------- */
  .streak-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 10px;
  }
  .streak-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .15s ease, transform .12s ease;
  }
  .streak-card:active { transform: scale(0.97); }
  .streak-card.lit { border-color: rgba(255,138,43,0.45); }
  .streak-flame { flex: 0 0 auto; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
  .streak-flame svg, .streak-flame img { width: 28px; height: 28px; display: block; }
  .streak-info { min-width: 0; }
  .streak-name {
    font-size: 12.5px; font-weight: 600; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
  }
  .streak-days { font-size: 12px; color: var(--text-tertiary); }
  .streak-days b { font-family: 'Rubik', sans-serif; color: var(--text-secondary); }
  .streak-card.lit .streak-days b { color: #FF8A2B; }

  /* ---------- Empty state ---------- */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-secondary);
    border: 1px dashed var(--card-border);
    border-radius: var(--radius-xl);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 14px; }
  .empty-state h3 { font-family:'Rubik',sans-serif; color: var(--text-primary); margin: 0 0 8px; font-size: 18px; }
  .empty-state p { margin: 0 0 20px; font-size: 14px; line-height: 1.5; }
  .empty-state button {
    background: linear-gradient(135deg, #3E9BFF, #7FC4FF);
    border: none; color: #06131F; font-weight: 700; font-family:'Rubik',sans-serif;
    padding: 12px 22px; border-radius: 100px; font-size: 14px; cursor: pointer;
  }

  /* ---------- Main card ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
    position: relative;
  }

  .card-close-btn {
    position: absolute; top: 16px; right: 16px; z-index: 5;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .card-close-btn:hover { color: var(--text-primary); }
  .card-close-btn svg { width: 16px; height: 16px; }

  .detail-closed-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-secondary);
    border: 1px dashed var(--card-border);
    border-radius: var(--radius-xl);
    cursor: pointer;
  }
  .detail-closed-state .icon { font-size: 34px; margin-bottom: 12px; }
  .detail-closed-state p { margin: 0; font-size: 14px; line-height: 1.5; }

  .card-top { padding: 30px 24px 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .ring-controls { display: flex; align-items: center; justify-content: center; gap: 22px; }

  .step-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--card-border);
    color: var(--text-primary);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform .12s ease, background .12s ease;
  }
  .step-btn:active { transform: scale(0.92); background: var(--divider); }
  .step-btn:disabled { opacity: 0.35; cursor: default; }

  .main-ring {
    width: 128px; height: 128px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative; flex: 0 0 auto;
  }
  .main-ring .inner {
    width: calc(100% - 10px); height: calc(100% - 10px);
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    box-shadow: inset 0 -6px 14px rgba(0,0,0,0.18), 0 8px 24px -6px rgba(0,0,0,0.4);
  }
  .main-ring .inner svg { width: 34px; height: 34px; }
  .main-ring .inner img { width: 34px; height: 34px; object-fit: cover; border-radius: 50%; }
  .main-ring .count {
    font-family: 'Rubik', sans-serif; font-weight: 600; font-size: 13px;
    color: rgba(255,255,255,0.92); letter-spacing: 0.5px;
  }

  .habit-name-row { display: flex; align-items: center; gap: 8px; }
  .habit-name { font-family: 'Rubik', sans-serif; font-weight: 600; font-size: 20px; }
  .icon-btn { width: 17px; height: 17px; color: var(--text-tertiary); cursor: pointer; flex: 0 0 auto; }
  .icon-btn:hover { color: var(--text-secondary); }

  .habit-sub { font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; text-align: center; }

  .divider { height: 1px; background: var(--divider); margin: 0; }

  /* ---------- Calendar ---------- */
  .calendar { padding: 20px 20px 16px; }
  .calendar-month-row {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-bottom: 16px;
  }
  .calendar-month { font-family: 'Rubik', sans-serif; font-weight: 600; font-size: 16px; min-width: 130px; text-align: center; }
  .month-nav-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg-elevated); border: 1px solid var(--card-border);
    color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px;
  }
  .month-nav-btn:hover { color: var(--text-primary); }

  .week-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
  .week-row span { text-align: center; font-size: 12px; color: var(--text-tertiary); text-transform: lowercase; }

  .days-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-cell {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 500; color: var(--text-secondary);
    border: 2px solid var(--card-border);
    cursor: pointer; margin: 0 auto;
    width: 38px; height: 38px;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  .day-cell.disabled { cursor: default; opacity: 0.3; border-color: transparent; }
  .day-cell.locked { cursor: default; }
  .day-cell.done { color: var(--text-primary); }
  .day-cell.today:not(.disabled) { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--habit-accent, #3E9BFF); }

  .calendar-hint { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 16px; }

  /* ---------- Stats ---------- */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); padding: 18px 12px; }
  .stat { text-align: center; display: flex; flex-direction: column; gap: 4px; }
  .stat b { font-family: 'Rubik', sans-serif; font-size: 22px; font-weight: 700; }
  .stat span { font-size: 11.5px; color: var(--text-tertiary); }
  .stat + .stat { border-left: 1px solid var(--divider); }

  .card-actions { display: flex; justify-content: center; padding: 0 20px 22px; }
  .delete-link {
    font-size: 13px; color: var(--text-tertiary); cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .delete-link:hover { color: var(--danger); }
  .delete-link svg { width: 14px; height: 14px; }

  /* ---------- Modal ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(6,8,12,0.72);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 50; backdrop-filter: blur(2px);
  }
  .overlay.open { display: flex; }

  .modal {
    width: 100%; max-width: 460px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 26px 26px 0 0;
    padding: 24px 22px 28px;
    max-height: 88vh;
    overflow-y: auto;
    animation: slideUp .22s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }

  .modal h2 { font-family:'Rubik',sans-serif; font-size: 19px; margin: 0 0 20px; text-align: center; }

  .modal-header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
  .modal-header h2 { margin: 0; }
  .modal-close-btn {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-elevated); border: 1px solid var(--card-border);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex: 0 0 auto;
  }
  .modal-close-btn:hover { color: var(--text-primary); }
  .modal-close-btn svg { width: 16px; height: 16px; }

  .field-label { font-size: 12.5px; color: var(--text-secondary); margin: 0 0 8px; font-weight: 600; }

  .text-input {
    width: 100%; padding: 13px 14px; border-radius: var(--radius-md);
    border: 1px solid var(--card-border); background: var(--bg-elevated);
    color: var(--text-primary); font-size: 15px; font-family: 'Inter', sans-serif;
    margin-bottom: 20px;
  }
  .text-input:focus { outline: none; border-color: #3E9BFF; }

  .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
  .icon-option {
    aspect-ratio: 1; border-radius: 50%; border: 2px solid var(--card-border);
    background: var(--bg-elevated); display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .icon-option svg { width: 20px; height: 20px; stroke: var(--text-secondary); }
  .icon-option.selected { border-color: #3E9BFF; }
  .icon-option.selected svg { stroke: #3E9BFF; }
  .icon-option img { width: 20px; height: 20px; object-fit: cover; border-radius: 50%; }
  .icon-option.add-icon-option { border-style: dashed; color: var(--text-tertiary); font-size: 18px; font-weight: 300; }
  .icon-option.add-icon-option:hover { color: var(--text-secondary); border-color: var(--text-secondary); }

  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
  .color-option {
    aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .color-option.selected { border-color: var(--text-primary); }

  .goal-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; }
  .goal-row .goal-controls { display: flex; align-items: center; gap: 14px; }
  .goal-num { font-family:'Rubik',sans-serif; font-weight: 700; font-size: 18px; min-width: 22px; text-align: center; }

  .modal-actions { display: flex; gap: 12px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 100px; border: none; font-weight: 700;
    font-family: 'Rubik', sans-serif; font-size: 14.5px; cursor: pointer;
  }
  .btn-primary { background: linear-gradient(135deg, #3E9BFF, #7FC4FF); color: #06131F; }
  .btn-secondary { background: var(--bg-elevated); border: 1px solid var(--card-border); color: var(--text-secondary); }

  .confirm-text { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 22px; line-height: 1.5; }

  .loading-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  .save-status {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    font-size: 12.5px;
    padding: 9px 16px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity .25s ease, transform .25s ease;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  .save-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .save-status.error { color: var(--danger); border-color: var(--danger); }

  .no-storage-banner {
    background: rgba(255,107,91,0.12);
    border: 1px solid rgba(255,107,91,0.35);
    color: #FF9A8C;
    font-size: 12.5px;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    line-height: 1.5;
    margin: -8px 0 4px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Формуй <span class="accent">звички</span><br>з трекером</h1>
  </div>

  <div class="habit-rail" id="habitRail"></div>

  <div id="storageBanner"></div>

  <div class="streak-grid" id="streakGrid"></div>

  <div id="mainArea"></div>

</div>

<div class="save-status" id="saveStatus">Збережено</div>

<!-- Модалка додавання / редагування звички -->
<div class="overlay" id="habitOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="habitModalTitle">Нова звичка</h2>
      <div class="modal-close-btn" id="habitCloseX">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
      </div>
    </div>

    <div class="field-label">Назва</div>
    <input class="text-input" id="habitNameInput" placeholder="Наприклад: Пити воду" maxlength="40">

    <div class="field-label">Іконка</div>
    <div class="icon-grid" id="iconGrid"></div>
    <input type="file" id="customIconInput" accept="image/*" style="display:none">

    <div class="field-label">Колір</div>
    <div class="color-grid" id="colorGrid"></div>

    <div class="field-label">Ціль на день</div>
    <div class="goal-row">
      <div class="goal-controls">
        <button class="step-btn" id="goalMinus" type="button">−</button>
        <div class="goal-num" id="goalNum">1</div>
        <button class="step-btn" id="goalPlus" type="button">+</button>
      </div>
      <div style="font-size:13px; color:var(--text-tertiary);">разів на день</div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="habitCancelBtn" type="button">Скасувати</button>
      <button class="btn btn-primary" id="habitSaveBtn" type="button">Зберегти</button>
    </div>
  </div>
</div>

<!-- Модалка підтвердження видалення -->
<div class="overlay" id="deleteOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Видалити звичку?</h2>
      <div class="modal-close-btn" id="deleteCloseX">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="confirm-text">Усі позначені дні та прогрес цієї звички буде втрачено назавжди.</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="deleteCancelBtn" type="button">Скасувати</button>
      <button class="btn" id="deleteConfirmBtn" style="background:var(--danger); color:#2B0806;" type="button">Видалити</button>
    </div>
  </div>
</div>

<script>
/* ================= ІКОНКИ ================= */
const ICONS = {
  drop:     '<path d="M12 2c3 4.5 6 8.2 6 12a6 6 0 1 1-12 0c0-3.8 3-7.5 6-12z"/>',
  dumbbell: '<path d="M9 12h6"/><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/><rect x="5" y="7" width="4" height="10" rx="1"/><rect x="15" y="7" width="4" height="10" rx="1"/>',
  pullup:   '<path d="M4 6h16"/><path d="M6 6v14"/><path d="M18 6v14"/><circle cx="12" cy="10" r="1.6"/><path d="M9.5 7.2L12 11.6L14.5 7.2M12 11.6v3.5l-2.5 4M12 15.1l2.5 4"/>',
  pushup:   '<circle cx="4" cy="8" r="1.6"/><path d="M5.4 9L18 11"/><path d="M9 9.6V15"/><path d="M18 11V15"/><path d="M2 15H21"/>',
  book:     '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  moon:     '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>',
  sun:      '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  apple:    '<path d="M12 6c1-2 3-3 5-2-1 2-2 3-4 3M7 9c-2 1-3 4-2 7 1 2.5 3 5 5 5 1.5 0 2-1 4-1s2.5 1 4 1c2 0 4-2.5 5-5 1-3 0-6-2-7-2-1.2-4-1-5-1s-3-.2-5 1z"/>',
  meditate: '<circle cx="12" cy="6" r="2"/><path d="M4 18c1-3 4-4 4-4h8s3 1 4 4M8 14l-2 5M16 14l2 5"/>',
  music:    '<path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/>',

  ['#3E9BFF', '#7FC4FF'],

/* ================= СТАН (зберігається у localStorage браузера на пристрої) ================= */
let habits = [];        // { id, name, icon, colors:[a,b], goal, progress, days:{ 'y-m-d': true } }
let activeHabitId = null;
let nextId = 1;
let customIcons = {};   // { 'custom_169...': 'data:image/png;base64,...' } — власні завантажені іконки
const STORAGE_KEY = 'habits-state-v1';
let storageAvailable = false;

try{
  const testKey = '__storage_test__';
  localStorage.setItem(testKey, '1');
  localStorage.removeItem(testKey);
  storageAvailable = true;
}catch(e){
  storageAvailable = false;
}

function showSaveStatus(text, isError){
  const el = document.getElementById('saveStatus');
  el.textContent = text;
  el.className = 'save-status show' + (isError ? ' error' : '');
  clearTimeout(showSaveStatus._t);
  showSaveStatus._t = setTimeout(() => { el.classList.remove('show'); }, 1500);
}

function renderStorageBanner(){
  const banner = document.getElementById('storageBanner');
  if (!storageAvailable){
    banner.innerHTML = `<div class="no-storage-banner">⚠ Збереження недоступне в цьому браузері (можливо, увімкнено приватний/інкогніто режим або заблоковано сховище). Дані не будуть запам'ятовуватись.</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function saveState(){
  if (!storageAvailable) { showSaveStatus('Не збережено — сховище недоступне', true); return; }
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ habits, activeHabitId, nextId, customIcons }));
    showSaveStatus('Збережено');
  }catch(e){
    console.error('Не вдалося зберегти дані:', e);
    showSaveStatus('Помилка збереження', true);
  }
}

function loadState(){
  if (!storageAvailable) return;
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      habits = parsed.habits || [];
      activeHabitId = parsed.activeHabitId ?? null;
      nextId = parsed.nextId || 1;
      customIcons = parsed.customIcons || {};
    }
  }catch(e){
    console.error('Не вдалося завантажити дані:', e);
  }
}

let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();

let editingHabitId = null; // null = створення нової
let selectedIcon = 'drop';
let selectedColorIdx = 0;
let selectedGoal = 1;
let detailClosed = true; // старт: показуємо головне меню, а не картку звички одразу

const MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const today = new Date();

function dayKey(y, m, d){ return `${y}-${m}-${d}`; }
function svgIcon(name, stroke){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`;
}
function habitIconMarkup(icon, stroke){
  if (customIcons[icon]) return `<img src="${customIcons[icon]}" alt="">`;
  return svgIcon(ICONS[icon] ? icon : 'drop', stroke);
}

/* ================= РЕНДЕР: РЕЙКА ЗВИЧОК ================= */
function conicRing(pct, colorStart, colorEnd){
  const deg = Math.max(0, Math.min(360, pct * 3.6));
  return `background: conic-gradient(${colorStart} 0deg, ${colorEnd} ${deg}deg, var(--track) ${deg}deg 360deg);`;
}

function renderRail(){
  const rail = document.getElementById('habitRail');
  rail.innerHTML = '';
  habits.forEach(h => {
    const pct = h.goal > 0 ? Math.round((h.progress / h.goal) * 100) : 0;
    const isComplete = h.goal > 0 && h.progress >= h.goal;
    const wrap = document.createElement('div');
    wrap.className = 'habit-chip-wrap';
    const chip = document.createElement('div');
    chip.className = 'habit-chip' + (h.id === activeHabitId ? ' active' : '') + (isComplete ? ' complete' : '');
    chip.style.cssText = conicRing(pct, h.colors[0], h.colors[1]);
    chip.innerHTML = `<div class="fill" style="background:linear-gradient(160deg, ${h.colors[0]}, ${h.colors[1]})">${habitIconMarkup(h.icon, 'white')}${isComplete ? `<div class="done-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>` : ''}</div>`;
    chip.addEventListener('click', () => { activeHabitId = h.id; detailClosed = false; renderAll(); });
    wrap.appendChild(chip);
    const label = document.createElement('div');
    label.className = 'habit-chip-label';
    label.textContent = h.name;
    wrap.appendChild(label);
    rail.appendChild(wrap);
  });

  const addWrap = document.createElement('div');
  addWrap.className = 'habit-chip-wrap';
  addWrap.innerHTML = `<div class="habit-chip add"><div class="fill">+</div></div><div class="habit-chip-label">Додати</div>`;
  addWrap.addEventListener('click', openCreateModal);
  rail.appendChild(addWrap);
}

function renderMainArea(){
  const area = document.getElementById('mainArea');

  if (habits.length === 0){
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">✨</div>
        <h3>Ще немає жодної звички</h3>
        <p>Додайте першу звичку, яку хочете відстежувати щодня — наприклад, воду, спорт чи читання.</p>
        <button id="emptyAddBtn">Додати звичку</button>
      </div>`;
    document.getElementById('emptyAddBtn').addEventListener('click', openCreateModal);
    return;
  }

  if (!habits.find(h => h.id === activeHabitId)) activeHabitId = habits[0].id;
  const h = habits.find(x => x.id === activeHabitId);
  const pct = h.goal > 0 ? Math.round((h.progress / h.goal) * 100) : 0;

  if (detailClosed){
    area.innerHTML = `
      <div class="detail-closed-state" id="reopenDetailBtn">
        <div class="icon">👌</div>
        <p>Оберіть звичку зі списку вище, щоб побачити прогрес і календар.</p>
      </div>`;
    document.getElementById('reopenDetailBtn').addEventListener('click', () => { detailClosed = false; renderMainArea(); });
    return;
  }

  area.innerHTML = `
    <div class="card">
      <div class="card-close-btn" id="closeDetailBtn" title="Закрити">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
      </div>
      <div class="card-top">
        <div class="ring-controls">
          <button class="step-btn" id="minusBtn" ${h.progress <= 0 ? 'disabled' : ''}>−</button>
          <div class="main-ring" id="mainRing" style="${conicRing(pct, h.colors[0], h.colors[1])}">
            <div class="inner" style="background:linear-gradient(160deg, ${h.colors[0]}, ${h.colors[1]})">
              ${habitIconMarkup(h.icon, 'white')}
              <div class="count">${h.progress}/${h.goal}</div>
            </div>
          </div>
          <button class="step-btn" id="plusBtn" ${h.progress >= h.goal ? 'disabled' : ''}>+</button>
        </div>

        <div class="habit-name-row">
          <div class="habit-name">${h.name}</div>
          <svg class="icon-btn" id="editHabitBtn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        </div>
        <div class="habit-sub" id="habitSub">${subText(h)}</div>
      </div>

      <div class="divider"></div>

      <div class="calendar">
        <div class="calendar-month-row">
          <div class="month-nav-btn" id="prevMonthBtn">‹</div>
          <div class="calendar-month">${MONTHS[viewMonth]} ${viewYear}</div>
          <div class="month-nav-btn" id="nextMonthBtn">›</div>
        </div>
        <div class="week-row"><span>пн</span><span>вт</span><span>ср</span><span>чт</span><span>пт</span><span>сб</span><span>нд</span></div>
        <div class="days-row" id="daysRow"></div>
        <div class="calendar-hint">Натисніть на день, щоб позначити виконання</div>
      </div>

      <div class="divider"></div>

      <div class="stats-row">
        <div class="stat"><b id="statStreak">0</b><span>без пропусків</span></div>
        <div class="stat"><b id="statPercent">0%</b><span>весь час</span></div>
        <div class="stat"><b id="statTotal">0</b><span>виконань</span></div>
      </div>

      <div class="divider"></div>

      <div class="card-actions">
        <div class="delete-link" id="deleteHabitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>

        </div>
      </div>
    </div>`;

  document.getElementById('minusBtn').addEventListener('click', () => {
    h.progress = Math.max(0, h.progress - 1);
    const key = dayKey(today.getFullYear(), today.getMonth(), today.getDate());
    if (h.progress < h.goal) delete h.days[key];
    renderAll(); saveState();
  });
  document.getElementById('plusBtn').addEventListener('click', () => {
    h.progress = Math.min(h.goal, h.progress + 1);
    const key = dayKey(today.getFullYear(), today.getMonth(), today.getDate());
    if (h.progress >= h.goal && h.goal > 0) h.days[key] = true;
    renderAll(); saveState();
  });
  document.getElementById('editHabitBtn').addEventListener('click', () => openEditModal(h.id));
  document.getElementById('prevMonthBtn').addEventListener('click', () => { changeMonth(-1); });
  document.getElementById('nextMonthBtn').addEventListener('click', () => { changeMonth(1); });
  document.getElementById('deleteHabitBtn').addEventListener('click', () => openDeleteModal(h.id));
  document.getElementById('closeDetailBtn').addEventListener('click', () => { detailClosed = true; renderMainArea(); });

  renderCalendar(h);
  recalcStats(h);
}

function subText(h){
  if (h.goal > 0 && h.progress >= h.goal) return 'Мету на сьогодні досягнуто 🔥';
  if (h.progress > 0) return 'В процесі — продовжуйте';
  return 'Ще не розпочато сьогодні';
}

function changeMonth(delta){
  viewMonth += delta;
  if (viewMonth < 0){ viewMonth = 11; viewYear--; }
  if (viewMonth > 11){ viewMonth = 0; viewYear++; }
  renderMainArea();
}

function renderCalendar(h){
  const row = document.getElementById('daysRow');
  row.innerHTML = '';
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const mondayOffset = (firstDay + 6) % 7;

  for (let i = 0; i < mondayOffset; i++){
    const empty = document.createElement('div');
    row.appendChild(empty);
  }

  const isFutureMonth = (viewYear > today.getFullYear()) || (viewYear === today.getFullYear() && viewMonth > today.getMonth());

  for (let d = 1; d <= daysInMonth; d++){
    const cell = document.createElement('div');
    const key = dayKey(viewYear, viewMonth, d);
    const isFutureDay = isFutureMonth || (viewYear === today.getFullYear() && viewMonth === today.getMonth() && d > today.getDate());
    const isToday = viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate();
    const isPastDay = !isFutureDay && !isToday;
    cell.className = 'day-cell' + (isFutureDay ? ' disabled' : '') + (isPastDay ? ' locked' : '');
    if (h.days[key]) {
      cell.classList.add('done');
      cell.style.borderColor = h.colors[0];
      cell.style.background = `linear-gradient(160deg, ${h.colors[0]}22, transparent)`;
    }
    if (isToday){
      cell.classList.add('today');
      cell.style.setProperty('--habit-accent', h.colors[0]);
    }
    cell.textContent = d;
    if (isToday){
      cell.addEventListener('click', () => {
        h.days[key] = !h.days[key];
        if (!h.days[key]) delete h.days[key];
        renderMainArea();
        renderStreakBoard();
        saveState();
      });
    }
    row.appendChild(cell);
  }
}

function computeStreak(h){
  let streak = 0;
  let cursor = new Date(today);
  while (true){
    const key = dayKey(cursor.getFullYear(), cursor.getMonth(), cursor.getDate());
    if (h.days[key]){ streak++; cursor.setDate(cursor.getDate() - 1); }
    else break;
  }
  return streak;
}

function recalcStats(h){
  const allKeys = Object.keys(h.days).filter(k => h.days[k]);
  document.getElementById('statTotal').textContent = allKeys.length;

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  let doneThisMonth = 0;
  for (let d = 1; d <= daysInMonth; d++){
    if (h.days[dayKey(viewYear, viewMonth, d)]) doneThisMonth++;
  }
  const pct = daysInMonth ? Math.round((doneThisMonth / daysInMonth) * 1000) / 10 : 0;
  document.getElementById('statPercent').textContent = pct + '%';

  document.getElementById('statStreak').textContent = computeStreak(h);
}

function pluralDays(n){
  const mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 14) return 'днів';
  if (mod10 === 1) return 'день';
  if (mod10 >= 2 && mod10 <= 4) return 'дні';
  return 'днів';
}

function flameIcon(habitId, lit){
  const src = lit ? FLAME_LIT_SRC : FLAME_UNLIT_SRC;
  return `<img src="${src}" alt="" style="width:100%;height:100%;object-fit:contain;">`;
}

function renderStreakBoard(){
  const grid = document.getElementById('streakGrid');
  if (!habits.length){ grid.innerHTML = ''; return; }
  grid.innerHTML = '';
  habits.forEach(h => {
    const isComplete = h.goal > 0 && h.progress >= h.goal;
    const streak = computeStreak(h);
    const card = document.createElement('div');
    card.className = 'streak-card' + (isComplete ? ' lit' : '');
    card.innerHTML = `
      <div class="streak-flame">${flameIcon(h.id, isComplete)}</div>
      <div class="streak-info">
        <div class="streak-name">${h.name}</div>
        <div class="streak-days"><b>${streak}</b> ${pluralDays(streak)} поспіль</div>
      </div>`;
    card.addEventListener('click', () => { activeHabitId = h.id; detailClosed = false; renderAll(); });
    grid.appendChild(card);
  });
}

/* ================= МОДАЛКА СТВОРЕННЯ / РЕДАГУВАННЯ ================= */
function buildIconGrid(){
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = '';
  Object.keys(ICONS).forEach(name => {
    const opt = document.createElement('div');
    opt.className = 'icon-option' + (name === selectedIcon ? ' selected' : '');
    opt.innerHTML = svgIcon(name, name === selectedIcon ? '#3E9BFF' : '#8A90A3');
    opt.addEventListener('click', () => { selectedIcon = name; buildIconGrid(); });
    grid.appendChild(opt);
  });
  Object.keys(customIcons).forEach(id => {
    const opt = document.createElement('div');
    opt.className = 'icon-option' + (id === selectedIcon ? ' selected' : '');
    opt.innerHTML = `<img src="${customIcons[id]}" alt="Своя іконка">`;
    opt.addEventListener('click', () => { selectedIcon = id; buildIconGrid(); });
    grid.appendChild(opt);
  });
  const addOpt = document.createElement('div');
  addOpt.className = 'icon-option add-icon-option';
  addOpt.textContent = '+';
  addOpt.title = 'Завантажити свою іконку';
  addOpt.addEventListener('click', () => { document.getElementById('customIconInput').click(); });
  grid.appendChild(addOpt);
}

function readAndResizeImage(file, maxSize){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = () => reject(new Error('Не вдалося прочитати зображення'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Не вдалося прочитати файл'));
    reader.readAsDataURL(file);
  });
}

document.getElementById('customIconInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try{
    const dataUrl = await readAndResizeImage(file, 128);
    const id = 'custom_' + Date.now();
    customIcons[id] = dataUrl;
    selectedIcon = id;
    buildIconGrid();
    saveState();
  }catch(err){
    console.error('Не вдалося завантажити іконку:', err);
    showSaveStatus('Не вдалося завантажити іконку', true);
  }
});

function buildColorGrid(){
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach((pair, idx) => {
    const opt = document.createElement('div');
    opt.className = 'color-option' + (idx === selectedColorIdx ? ' selected' : '');
    opt.style.background = `linear-gradient(160deg, ${pair[0]}, ${pair[1]})`;
    opt.addEventListener('click', () => { selectedColorIdx = idx; buildColorGrid(); });
    grid.appendChild(opt);
  });
}

function updateGoalDisplay(){
  document.getElementById('goalNum').textContent = selectedGoal;
}

function openCreateModal(){
  editingHabitId = null;
  document.getElementById('habitModalTitle').textContent = 'Нова звичка';
  document.getElementById('habitNameInput').value = '';
  selectedIcon = 'drop';
  selectedColorIdx = habits.length % COLORS.length;
  selectedGoal = 1;
  buildIconGrid(); buildColorGrid(); updateGoalDisplay();
  document.getElementById('habitOverlay').classList.add('open');
  document.getElementById('habitNameInput').focus();
}

function openEditModal(id){
  const h = habits.find(x => x.id === id);
  editingHabitId = id;
  document.getElementById('habitModalTitle').textContent = 'Редагувати звичку';
  document.getElementById('habitNameInput').value = h.name;
  selectedIcon = h.icon;
  selectedColorIdx = COLORS.findIndex(c => c[0] === h.colors[0]);
  if (selectedColorIdx < 0) selectedColorIdx = 0;
  selectedGoal = h.goal;
  buildIconGrid(); buildColorGrid(); updateGoalDisplay();
  document.getElementById('habitOverlay').classList.add('open');
}

function closeHabitModal(){
  document.getElementById('habitOverlay').classList.remove('open');
}

document.getElementById('goalMinus').addEventListener('click', () => { selectedGoal = Math.max(1, selectedGoal - 1); updateGoalDisplay(); });
document.getElementById('goalPlus').addEventListener('click', () => { selectedGoal = Math.min(20, selectedGoal + 1); updateGoalDisplay(); });
document.getElementById('habitCancelBtn').addEventListener('click', closeHabitModal);
document.getElementById('habitCloseX').addEventListener('click', closeHabitModal);

// Закриття тапом поза вікном модалки
document.getElementById('habitOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'habitOverlay') closeHabitModal();
});
document.getElementById('deleteOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'deleteOverlay') closeDeleteModal();
});

// Закриття клавішею Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape'){
    closeHabitModal();
    closeDeleteModal();
  }
});

document.getElementById('habitSaveBtn').addEventListener('click', () => {
  const name = document.getElementById('habitNameInput').value.trim();
  if (!name){
    document.getElementById('habitNameInput').style.borderColor = 'var(--danger)';
    document.getElementById('habitNameInput').placeholder = 'Введіть назву звички';
    return;
  }
  if (editingHabitId === null){
    const newHabit = {
      id: nextId++,
      name,
      icon: selectedIcon,
      colors: COLORS[selectedColorIdx],
      goal: selectedGoal,
      progress: 0,
      days: {}
    };
    habits.push(newHabit);
    activeHabitId = newHabit.id;
    detailClosed = false;
  } else {
    const h = habits.find(x => x.id === editingHabitId);
    h.name = name;
    h.icon = selectedIcon;
    h.colors = COLORS[selectedColorIdx];
    h.goal = selectedGoal;
    h.progress = Math.min(h.progress, h.goal);
  }
  closeHabitModal();
  renderAll();
  saveState();
});

/* ================= МОДАЛКА ВИДАЛЕННЯ ================= */
let pendingDeleteId = null;
function openDeleteModal(id){
  pendingDeleteId = id;
  document.getElementById('deleteOverlay').classList.add('open');
}
function closeDeleteModal(){
  document.getElementById('deleteOverlay').classList.remove('open');
  pendingDeleteId = null;
}
document.getElementById('deleteCancelBtn').addEventListener('click', closeDeleteModal);
document.getElementById('deleteCloseX').addEventListener('click', closeDeleteModal);
document.getElementById('deleteConfirmBtn').addEventListener('click', () => {
  habits = habits.filter(h => h.id !== pendingDeleteId);
  if (activeHabitId === pendingDeleteId) activeHabitId = habits.length ? habits[0].id : null;
  document.getElementById('deleteOverlay').classList.remove('open');
  pendingDeleteId = null;
  renderAll();
  saveState();
});

/* ================= СТАРТ (підвантажуємо збережене, якщо є) ================= */
function renderAll(){
  renderRail();
  renderStreakBoard();
  renderMainArea();
}

document.getElementById('mainArea').innerHTML = '<div class="loading-state">Завантаження…</div>';
renderStorageBanner();
loadState();
renderAll();
</script>
</body>
